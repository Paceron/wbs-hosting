  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f3f8;color:#1a1a2e;overflow:hidden;height:100vh;display:flex;flex-direction:column}
  .header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);color:#fff;padding:16px 32px;display:flex;align-items:center;gap:16px;flex-shrink:0}
  .header h1{font-size:22px;font-weight:600;letter-spacing:.3px}
  .header .sub{font-size:13px;opacity:.75;margin-top:2px}
  .header .badge{background:#e94560;padding:3px 12px;border-radius:10px;font-size:11px;font-weight:600;margin-left:auto}
  .toolbar{background:#fff;padding:10px 32px;border-bottom:1px solid #dce3ec;display:flex;align-items:center;gap:12px;flex-shrink:0;flex-wrap:wrap}
  .toolbar button{padding:5px 14px;border:1px solid #c8d0dc;border-radius:5px;background:#fff;cursor:pointer;font-size:12px;transition:all .15s;display:flex;align-items:center;gap:5px}
  .toolbar button:hover{background:#e8edf5;border-color:#8a9bb5}
  .toolbar .legend{display:flex;gap:10px;flex-wrap:wrap;margin-left:auto}
  .toolbar .leg-item{display:flex;align-items:center;gap:5px;font-size:10px;color:#555}
  .toolbar .leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
  .toolbar .stats{font-size:11px;color:#777;margin-left:4px}
  #vis-container{flex:1;position:relative;overflow:hidden;background: #f7f9fc; background-image: radial-gradient(circle, #dce3ec 1px, transparent 1px); background-size: 24px 24px;}
  svg{width:100%;height:100%;display:block}
  .link{fill:none;stroke:#a0b0c4;stroke-width:1.8;stroke-opacity:.7}
  .node-group{cursor:pointer}
  .node-rect{stroke:#c8d0dc;stroke-width:1}
  .node-rext-root{fill:url(#rootGrad);stroke:none}
  .node-text{font-family:'Segoe UI',Arial,sans-serif;pointer-events:none;fill:#fff}
  .node-text.deliverable-text{fill:#fff;font-weight:600;font-size:12px}
  .node-text.wp-text{fill:#2c3e50;font-weight:500;font-size:10px}
  .node-text.task-text{fill:#5a6a7a;font-size:9px;font-weight:400}
  .count-badge{font-size:9px;fill:#fff;text-anchor:middle;dominant-baseline:central}
  .count-bg{fill:#e94560}
  .task-tooltip{position:absolute;background:#1a1a2e;color:#fff;padding:8px 12px;border-radius:6px;font-size:11px;line-height:1.5;max-width:320px;pointer-events:none;opacity:0;transition:opacity .15s;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,.25)}
  .task-tooltip.visible{opacity:1}
  .task-tooltip .tt-title{font-weight:600;font-size:10px;opacity:.7;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
  .task-tooltip .tt-item{padding:2px 0;border-bottom:1px solid rgba(255,255,255,.08)}
  .task-tooltip .tt-item:last-child{border:none}
  #tooltip{margin:0}
  @media print{
    body{background:#fff;overflow:visible}
    .header{-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .toolbar{display:none}
    #vis-container{overflow:visible!important;height:auto!important}
    svg{height:auto!important}
  }
</style>

function buildHierarchy(csv) {
  const deliverables = [];
  let currentDel = null, lastWp = null, delIdx = -1;

  for (const [del, wp, task] of csv) {
    const d = (del || '').trim(), w = (wp || '').trim(), t = (task || '').trim();

    if (d) {
      delIdx++;
      currentDel = { name: d, colorIdx: delIdx, children: [] };
      deliverables.push(currentDel);
      lastWp = null;
    }

    if (!currentDel) continue;

    if (w) {
      const wpNode = { name: w };
      if (t) wpNode.tasks = [t];
      currentDel.children.push(wpNode);
      lastWp = wpNode;
    } else if (t && lastWp) {
      if (!lastWp.tasks) lastWp.tasks = [];
      lastWp.tasks.push(t);
    }
  }

  return { name: 'Paceron', children: deliverables };
}

let collapsedWPs = new Set();

// ─── Text measurement helpers (Canvas API) ──────────────────────
const FONT = "'Segoe UI',Arial,sans-serif";
function txW(text, size, weight) {
  const c = document.createElement('canvas');
  const ctx = c.getContext('2d');
  ctx.font = `${weight} ${size} ${FONT}`;
  return ctx.measureText(text).width;
}
function wrapLines(text, maxW, size, weight) {
  const words = text.split(/\s+/);
  if (!words.length) return [text];
  const lines = [];
  let cur = words[0];
  for (let i = 1; i < words.length; i++) {
    if (txW(cur + ' ' + words[i], size, weight) > maxW) {
      lines.push(cur); cur = words[i];
    } else { cur += ' ' + words[i]; }
  }
  lines.push(cur);
  return lines;
}

// ─── Node style per depth ───────────────────────────────────────
const STYLE = [
  { w:150, minH:40, fs:'17px', fw:'700', fg:'#fff', lh:24, maxW:130 },
  { w:210, minH:34, fs:'14px', fw:'600', fg:'#fff', lh:20, maxW:185 },
  { w:200, minH:26, fs:'11px', fw:'500', fg:'#1a2a3a', lh:16, maxW:178 },
  { w:200, minH:30, fs:'11px', fw:'500', fg:'#1a2a3a', lh:16, maxW:178 }, // WP+tasks
  { w:190, minH:20, fs:'10px', fw:'400', fg:'#5a6a7a', lh:14, maxW:168 }
];

function nodeH(name, dep, hasTasks) {
  const s = dep === 2 && hasTasks ? STYLE[3] : STYLE[dep] || STYLE[4];
  if (txW(name, s.fs, s.fw) <= s.maxW) return s.minH;
  const n = wrapLines(name, s.maxW, s.fs, s.fw).length;
  return Math.max(s.minH, Math.ceil(n * s.lh + 4));
}

  const height = container.clientHeight || 800;
  svg.attr('viewBox', `0 0 ${width} ${height}`);

  treeGroup = svg.select('#tree-group');
  treeGroup.selectAll('*').remove();

  const data = buildHierarchy(CSV);

  // Stats
  let tWP = 0, tTk = 0;
  data.children.forEach(d => d.children.forEach(wp => {
    tWP++; if (wp.tasks) tTk += wp.tasks.length;
  }));
  document.getElementById('stats').textContent =
    `${data.children.length} entregables · ${tWP} paquetes · ${tTk} tareas`;

  // Legend
  document.getElementById('legend').innerHTML = data.children.map((d, i) =>
    `<div class="leg-item"><span class="leg-dot" style="background:${COLORS[i]}"></span>${d.name}</div>`
  ).join('');

  // ─── Pre-compute heights ─────────────────────────────────────
  // Each node gets: id, name, dep, x, y, w, _h, ci, tasks, parent
  const all = []; // flat array of all nodes
  const links = [];

  // Root
  all.push({ id:'root', name:'Paceron', dep:0, w:STYLE[0].w, _h:STYLE[0].minH, ci:-1, tasks:[], x:0 });

  const GAP = { rootDel:50, delWp:24, wpWp:16, wpTask:16, taskTask:10, delDel:28 };
  const PAD = { top:36, bottom:40 };
  const nDel = data.children.length;
  const totalW = nDel * STYLE[1].w + (nDel - 1) * GAP.delDel;

  // Compute Y positions
  let maxY = PAD.top + STYLE[0].minH;
  all[0].y = PAD.top;

  data.children.forEach((del, di) => {
    const dx = -totalW / 2 + STYLE[1].w / 2 + di * (STYLE[1].w + GAP.delDel);
    const dy = PAD.top + STYLE[0].minH + GAP.rootDel;
    const hDel = nodeH(del.name, 1, false);
    const did = `d${di}`;

    all.push({ id:did, name:del.name, dep:1, x:dx, y:dy, w:STYLE[1].w, _h:hDel, ci:di, tasks:[], parent:'root' });
    links.push({ src:'root', dst:did });
    maxY = Math.max(maxY, dy + hDel);

    let wy = dy + hDel + GAP.delWp;

    del.children.forEach((wp, wi) => {
      const hasT = wp.tasks && wp.tasks.length > 0;
      const hWp = nodeH(wp.name, 2, hasT);
      const wid = `${did}w${wi}`;
      const wpCollapsed = collapsedWPs.has(wid);

      all.push({ id:wid, name:wp.name, dep:2, x:dx, y:wy, w:STYLE[2].w, _h:hWp,
        ci:di, tasks:wp.tasks||[], parent:did, nTasks:hasT ? wp.tasks.length : 0,
        collapsed: wpCollapsed });
      links.push({ src:did, dst:wid });
      wy += hWp + GAP.wpWp;
      maxY = Math.max(maxY, wy);

      // Tasks (only if not collapsed)
      if (hasT && !wpCollapsed) {
        let ty = wy + GAP.wpTask - GAP.wpWp;
        wp.tasks.forEach((tk, ti) => {
          const hTk = nodeH(tk, 3, false);
          const tid = `${wid}t${ti}`;
          all.push({ id:tid, name:tk, dep:3, x:dx, y:ty, w:STYLE[4].w, _h:hTk,
            ci:di, tasks:[], parent:wid });
          links.push({ src:wid, dst:tid });
          ty += hTk + GAP.taskTask;
        });
        wy = ty - GAP.taskTask + GAP.wpWp;
        maxY = Math.max(maxY, wy);
      }
    });
  });

  // ─── Links ────────────────────────────────────────────────────
  treeGroup.selectAll('.link')
    .data(links)
    .join('path')
    .attr('class', 'link')
    .attr('d', d => {
      const src = all.find(n => n.id === d.src);
      const dst = all.find(n => n.id === d.dst);
      if (!src || !dst) return '';
      const sy = src.y + (src._h || STYLE[src.dep]?.minH || 19) / 2;
      const ty = dst.y - (dst._h || STYLE[dst.dep]?.minH || 19) / 2;
      const mx = (src.x + dst.x) / 2, my = (sy + ty) / 2;
      return `M${src.x},${sy} C${src.x},${my} ${dst.x},${my} ${dst.x},${ty}`;
    });

  // ─── Nodes ────────────────────────────────────────────────────
  const nodeGroups = treeGroup.selectAll('.node-group')
    .data(all)
    .join('g')
    .attr('class', 'node-group')
    .attr('transform', d => `translate(${d.x},${d.y})`);

  nodeGroups.each(function(d) {
    const el = d3.select(this);
    const dep = d.dep;
    const ci = d.ci;
    const color = COLORS[ci >= 0 ? ci % COLORS.length : 0];
    const light = COLOR_LIGHT[ci >= 0 ? ci % COLOR_LIGHT.length : 0];
    const hasTasks = dep === 2 && d.tasks && d.tasks.length > 0;
    const nTasks = d.nTasks || 0;
    const s = dep === 2 && hasTasks ? STYLE[3] : STYLE[dep] || STYLE[4];
    const w = d.w, h = d._h || s.minH;

    let rx, fill, stroke, sw, flt;
    if (dep === 0)       { rx=10; fill='url(#rootGrad)'; stroke='none'; sw=0; flt='url(#shadow)'; }
    else if (dep === 1)  { rx=7;  fill=color;            stroke='none'; sw=0; flt='url(#shadow)'; }
    else if (dep === 2)  { rx=5;  fill=light;            stroke=color+'55'; sw=1; flt='url(#shadow-sm)'; }
    else                 { rx=4;  fill='#f8faff';        stroke='#d8e0ec'; sw=1; flt=null; }

    el.append('rect')
      .attr('width', w).attr('height', h)
      .attr('x', -w/2).attr('y', -h/2)
      .attr('rx', rx).attr('ry', rx)
      .attr('fill', fill).attr('stroke', stroke)
      .attr('stroke-width', sw).attr('filter', flt);

    // Badge on WP with tasks
    if (hasTasks) {
      el.append('circle').attr('cx', w/2-5).attr('cy', -h/2-5).attr('r', 9)
        .attr('fill','#e94560').attr('stroke','#fff').attr('stroke-width',1.5);
      el.append('text').attr('x', w/2-5).attr('y', -h/2-5)
        .attr('text-anchor','middle').attr('dominant-baseline','central')
        .attr('fill','#fff').attr('font-size','8px').attr('font-weight','700')
        .text(nTasks > 9 ? '9+' : nTasks);
    }

    // ─── Multiline text ───────────────────────────────────────
    const elText = el.append('text')
      .attr('text-anchor','middle')
      .attr('dominant-baseline','central')
      .attr('fill', s.fg).attr('font-weight', s.fw).attr('font-size', s.fs);

    // Use word-wrapping with tspan elements
    const maxW = s.maxW;
    if (txW(d.name, s.fs, s.fw) <= maxW) {
      elText.text(d.name);
    } else {
      const lines = wrapLines(d.name, maxW, s.fs, s.fw);
      const n = lines.length;
      // multiline: center the block vertically
      const totalH = n * s.lh;
      const startY = -totalH / 2 + s.lh / 2;
      elText.text('');
      lines.forEach((line, i) => {
        elText.append('tspan')
          .attr('x', 0)
          .attr('y', startY + i * s.lh)
          .text(line || ' ');
      });
    }

    // ─── Click on WP to toggle tasks ─────────────────────────
    if (dep === 2 && hasTasks) {
      el.style('cursor', 'pointer');
      el.on('click', () => {
        if (collapsedWPs.has(d.id)) collapsedWPs.delete(d.id);
        else collapsedWPs.add(d.id);
        render();
      });
    }

    // ─── Tooltip on every node (named events to not conflict) ──
    el.on('mouseenter.tip', function(event) {
      if (event.buttons) return;
      const tt = d3.select('#tooltip');
      let title, items = [];
      if (dep === 0) {
        title = 'Paceron — Proyecto raíz';
      } else if (dep === 1) {
        title = 'Entregable: ' + d.name;
      } else if (dep === 2) {
        title = d.name + (hasTasks ? ' (' + nTasks + ' tareas)' : '');
        if (hasTasks) items = d.tasks;
      } else {
        title = 'Tarea: ' + d.name;
      }
      tt.select('#tt-title').text(title);
      const list = tt.select('#tt-list').html('');
      items.forEach(t => list.append('div').attr('class','tt-item').text(t));
      const [mx, my] = d3.pointer(event, container);
      tt.style('left',(mx+20)+'px').style('top',(my-10)+'px').classed('visible',true);
    })
    .on('mousemove.tip', function(event) {
      if (event.buttons) return;
      const [mx, my] = d3.pointer(event, container);
      d3.select('#tooltip').style('left',(mx+20)+'px').style('top',(my-10)+'px');
    })
    .on('mouseleave.tip', () => d3.select('#tooltip').classed('visible',false));

    // ─── Hover highlight (named events) ─────────────────────
    el.on('mouseenter.hover', function() {
      if (dep > 0) d3.select(this).select('rect')
        .attr('stroke-width',2).attr('stroke', dep === 1 ? '#fff' : '#4a6fa5');
    })
    .on('mouseleave.hover', function() {
      if (dep > 0) d3.select(this).select('rect')
        .attr('stroke-width', sw).attr('stroke', dep === 1 ? 'none' : color+'55');
    });
  });
}

// Zoom controls
let currentZoom = 1;

function setupZoom() {
  const container = document.getElementById('vis-container');
  const svgEl = document.getElementById('tree-svg');

  zoom = d3.zoom()
    .scaleExtent([0.1, 4])
    .on('zoom', (event) => {
      treeGroup.attr('transform', event.transform);
      currentZoom = event.transform.k;
    });

  d3.select(svgEl).call(zoom);

  // Initial center
  setTimeout(centerTree, 100);
}

function zoomIn() {
  d3.select('#tree-svg').transition().duration(200).call(zoom.scaleBy, 1.3);
}

function zoomOut() {
  d3.select('#tree-svg').transition().duration(200).call(zoom.scaleBy, 0.7);
}

function resetZoom() {
  d3.select('#tree-svg').transition().duration(300).call(zoom.transform, d3.zoomIdentity);
}

function centerTree() {
  const container = document.getElementById('vis-container');
  const w = container.clientWidth;
  const h = container.clientHeight;
  const treeGroupEl = document.getElementById('tree-group');
  if (!treeGroupEl) return;

  const bbox = treeGroupEl.getBBox();
  if (!bbox.width || !bbox.height) return;

  const scale = Math.min(w / (bbox.width + 80), h / (bbox.height + 80), 1.5);
  const tx = (w - bbox.width * scale) / 2 - bbox.x * scale;
  const ty = (h - bbox.height * scale) / 2 - bbox.y * scale;

  d3.select('#tree-svg').transition().duration(400).call(
    zoom.transform,
    d3.zoomIdentity.translate(tx, ty).scale(scale)
  );
}

// Initialize
window.addEventListener('load', () => {
  render();
  setupZoom();
});

window.addEventListener('resize', () => {
  const container = document.getElementById('vis-container');
  const svgEl = document.getElementById('tree-svg');
  svgEl.setAttribute('viewBox', `0 0 ${container.clientWidth} ${container.clientHeight}`);
  centerTree();
});
</script>
